name: Build and Release NEXUS

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create .env for build
        run: |
          echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env
          echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> .env
          echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> .env
          echo "EMAIL_FROM=NEXUS <${{ secrets.EMAIL_USER }}>" >> .env

      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-Windows
          path: |
            dist/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create .env for build
        run: |
          echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env
          echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> .env
          echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> .env
          echo "EMAIL_FROM=NEXUS <${{ secrets.EMAIL_USER }}>" >> .env

      - name: Build Mac
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTODISCOVERY: false

      - name: Upload Mac Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-Mac
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create .env for build
        run: |
          echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env
          echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> .env
          echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> .env
          echo "EMAIL_FROM=NEXUS <${{ secrets.EMAIL_USER }}>" >> .env

      - name: Build Linux
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-Linux
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: NEXUS ${{ github.ref_name }}
          body: |
            ## NEXUS ${{ github.ref_name }}

            **Daily Life Operating System** — Productivity, Habits, Fitness, Career, and Focus in one app.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows (Installer) | `NEXUS Setup *.exe` |
            | Windows (Portable) | `NEXUS *.exe` |
            | macOS | `NEXUS-*.dmg` |
            | Linux (AppImage) | `NEXUS-*.AppImage` |
            | Linux (Debian) | `nexus-productivity_*.deb` |

            ### Features
            - Dashboard with Life Score (0-100)
            - Habit tracking with streaks and analytics
            - Goal system with milestones
            - Fitness & health logging (sleep, water, mood, energy, workouts)
            - Career tracker with SVG skill radar chart
            - Focus sessions (Pomodoro) with distraction tracking
            - Smart alerts (burnout, streak risk, overdue, time debt)
            - Email notifications (timer done, focus done, daily summary)
            - Windows native notifications + taskbar flash
            - Unified timeline view
            - Weekly review with auto-generated insights
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
          draft: false
          prerelease: false
