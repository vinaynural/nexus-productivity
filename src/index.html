<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEXUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
/* ================================================================
   RESET & ROOT
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0d0e12;
  --s1:       #14151b;
  --s2:       #1c1d26;
  --s3:       #22232f;
  --s4:       #2a2b39;
  --b1:       rgba(255,255,255,0.06);
  --b2:       rgba(255,255,255,0.11);
  --b3:       rgba(255,255,255,0.18);
  --text:     #e8e9f0;
  --muted:    #6b6d80;
  --dim:      #4a4c60;
  --accent:   #7c6af7;
  --accent2:  #a896ff;
  --green:    #3ecf8e;
  --amber:    #f5a623;
  --red:      #f06060;
  --blue:     #4fa3e8;
  --pink:     #e879a0;
  --fh:       'Syne', sans-serif;
  --fb:       'DM Sans', sans-serif;
  --fm:       'DM Mono', monospace;
  --r:        10px;
  --r2:       14px;
}
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--fb); font-size: 14px; user-select: none; }

/* ================================================================
   TITLEBAR
   ================================================================ */
.titlebar {
  height: 38px; background: var(--s1);
  border-bottom: 1px solid var(--b1);
  display: flex; align-items: center;
  -webkit-app-region: drag;
  padding: 0 16px; gap: 12px; flex-shrink: 0;
}
.titlebar-logo { font-family: var(--fh); font-size: 13px; font-weight: 800; letter-spacing: 2px; background: linear-gradient(135deg, var(--accent2), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.titlebar-spacer { flex: 1; }
.titlebar-info { font-family: var(--fm); font-size: 11px; color: var(--dim); }
.titlebar-notif { -webkit-app-region: no-drag; position: relative; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 6px; transition: all 0.15s; }
.titlebar-notif:hover { color: var(--text); background: var(--s3); }
.notif-badge { position: absolute; top: 0; right: 2px; background: var(--red); color: #fff; font-size: 9px; font-weight: 700; min-width: 15px; height: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: var(--fm); }
.notif-badge.hidden { display: none; }
.titlebar-controls { display: flex; gap: 6px; -webkit-app-region: no-drag; }
.tc-btn { width: 28px; height: 22px; border-radius: 6px; border: none; background: var(--s3); color: var(--muted); cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.tc-btn:hover { background: var(--s4); color: var(--text); }
.tc-btn.close:hover { background: rgba(240,96,96,0.25); color: var(--red); }

/* ================================================================
   AUTH SCREEN
   ================================================================ */
.auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-card { background: var(--s1); border: 1px solid var(--b2); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
.auth-logo { font-family: var(--fh); font-size: 36px; font-weight: 800; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent2), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.auth-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 30px; }
.auth-form { text-align: left; }
.auth-switch { margin-top: 20px; font-size: 13px; color: var(--dim); text-align: center; }
.auth-switch span { color: var(--accent2); cursor: pointer; font-weight: 500; }
.auth-error { color: var(--red); font-size: 12px; margin-bottom: 15px; display: none; background: rgba(240,96,96,0.1); padding: 8px; border-radius: 6px; }

/* ================================================================
   APP SHELL
   ================================================================ */
.app { display: grid; grid-template-columns: 220px 1fr; height: calc(100vh - 38px); }

/* ================================================================
   SIDEBAR
   ================================================================ */
.sidebar { background: var(--s1); border-right: 1px solid var(--b1); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-logo { padding: 18px 18px 14px; border-bottom: 1px solid var(--b1); }
.sidebar-logo h1 { font-family: var(--fh); font-size: 24px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent2), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.sidebar-logo p { font-size: 11px; color: var(--dim); font-family: var(--fm); margin-top: 2px; }

.nav-scroll { flex: 1; overflow-y: auto; padding: 10px 10px; }
.nav-section { margin-bottom: 6px; }
.nav-lbl { font-size: 10px; font-family: var(--fm); color: var(--dim); letter-spacing: 1.2px; padding: 10px 8px 5px; text-transform: uppercase; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; font-size: 13.5px; font-weight: 500; color: var(--muted); transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { background: var(--s2); color: var(--text); }
.nav-item.active { background: rgba(124,106,247,0.14); color: var(--accent2); }
.nav-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-count { margin-left: auto; font-family: var(--fm); font-size: 11px; background: var(--s3); padding: 2px 7px; border-radius: 20px; color: var(--dim); min-width: 22px; text-align: center; }

.sidebar-bottom { padding: 12px; border-top: 1px solid var(--b1); flex-shrink: 0; }
.life-score-ring { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; position: relative; }
.life-score-inner { width: 64px; height: 64px; border-radius: 50%; background: var(--s1); display: flex; align-items: center; justify-content: center; flex-direction: column; }
.life-score-num { font-family: var(--fh); font-size: 22px; font-weight: 800; line-height: 1; }
.life-score-lbl { font-size: 9px; color: var(--dim); font-family: var(--fm); margin-top: 2px; }
.sidebar-checkin-btn { width: 100%; margin-top: 10px; background: var(--s2); border: 1px solid var(--b1); color: var(--muted); padding: 8px; border-radius: 8px; cursor: pointer; font-family: var(--fb); font-size: 12px; font-weight: 500; transition: all 0.15s; }
.sidebar-checkin-btn:hover { background: var(--s3); color: var(--text); border-color: var(--b2); }

/* ================================================================
   MAIN PANEL
   ================================================================ */
.main { display: flex; flex-direction: column; overflow: hidden; }

.topbar { display: flex; align-items: center; gap: 12px; padding: 14px 22px; border-bottom: 1px solid var(--b1); background: var(--s1); flex-shrink: 0; }
.topbar-title { font-family: var(--fh); font-size: 18px; font-weight: 700; flex: 1; }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

.btn { border: none; border-radius: 8px; cursor: pointer; font-family: var(--fb); font-size: 13px; font-weight: 500; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--accent); color: #fff; padding: 8px 16px; }
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-ghost { background: var(--s2); color: var(--muted); padding: 8px 12px; border: 1px solid var(--b1); }
.btn-ghost:hover { color: var(--text); background: var(--s3); border-color: var(--b2); }
.btn-danger { background: rgba(240,96,96,0.12); color: var(--red); padding: 8px 12px; border: 1px solid rgba(240,96,96,0.2); }
.btn-danger:hover { background: rgba(240,96,96,0.2); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ================================================================
   FILTER ROW (Tasks)
   ================================================================ */
.filter-row { display: flex; align-items: center; gap: 8px; padding: 10px 22px; border-bottom: 1px solid var(--b1); background: var(--s1); flex-shrink: 0; flex-wrap: wrap; }
.filter-btn { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--b1); background: none; color: var(--muted); font-family: var(--fb); transition: all 0.15s; }
.filter-btn:hover { border-color: var(--b2); color: var(--text); }
.filter-btn.active { background: rgba(124,106,247,0.18); border-color: var(--accent); color: var(--accent2); }
.filter-spacer { flex: 1; }
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--dim); pointer-events: none; }
.search-input { background: var(--s2); border: 1px solid var(--b1); border-radius: 8px; padding: 7px 12px 7px 32px; color: var(--text); font-size: 13px; font-family: var(--fb); width: 200px; transition: all 0.2s; }
.search-input:focus { outline: none; border-color: var(--accent); width: 260px; }
.search-input::placeholder { color: var(--dim); }

/* ================================================================
   VIEW CONTAINER
   ================================================================ */
.view-container { flex: 1; overflow-y: auto; padding: 18px 22px; }
.view-container::-webkit-scrollbar { width: 4px; }
.view { display: none; }
.view.active { display: block; }

/* ================================================================
   TASK AREA
   ================================================================ */
.task-area { flex: 1; overflow-y: auto; padding: 18px 22px; }

.section-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; margin-top: 4px; }
.section-hdr h3 { font-family: var(--fm); font-size: 11px; font-weight: 500; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
.section-line { flex: 1; height: 1px; background: var(--b1); }

.task-card { background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r2); padding: 13px 15px; margin-bottom: 7px; display: flex; align-items: flex-start; gap: 12px; transition: all 0.18s; position: relative; overflow: hidden; }
.task-card:hover { border-color: var(--b2); background: var(--s2); transform: translateX(2px); }
.task-card.done { opacity: 0.38; }
.task-card.done .task-title { text-decoration: line-through; color: var(--dim); }
.priority-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }

.cb { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--b3); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; margin-top: 2px; background: none; }
.cb:hover { border-color: var(--green); }
.cb.checked { background: var(--green); border-color: var(--green); }
.cb.checked::after { content: ''; display: block; width: 5px; height: 9px; border: 2px solid #0d0e12; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }

.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-desc { font-size: 12px; color: var(--muted); margin-bottom: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-style: italic; }
.task-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

.badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-family: var(--fm); font-weight: 500; white-space: nowrap; }
.badge-work     { background: rgba(79,163,232,0.14); color: var(--blue); }
.badge-personal { background: rgba(62,207,142,0.14); color: var(--green); }
.badge-urgent   { background: rgba(240,96,96,0.15);  color: var(--red); }
.badge-high     { background: rgba(245,166,35,0.15); color: var(--amber); }
.badge-normal   { background: rgba(124,106,247,0.15);color: var(--accent2); }
.badge-low      { background: rgba(107,109,128,0.14);color: var(--muted); }
.badge-due      { background: var(--s3); color: var(--muted); }
.badge-due.overdue { background: rgba(240,96,96,0.12); color: var(--red); }
.badge-energy-low { background: rgba(62,207,142,0.12); color: var(--green); }
.badge-energy-medium { background: rgba(245,166,35,0.12); color: var(--amber); }
.badge-energy-high { background: rgba(240,96,96,0.12); color: var(--red); }
.badge-category { background: var(--s3); color: var(--dim); }
.badge-green { background: rgba(62,207,142,0.14); color: var(--green); }
.badge-amber { background: rgba(245,166,35,0.14); color: var(--amber); }
.badge-red { background: rgba(240,96,96,0.14); color: var(--red); }
.badge-blue { background: rgba(79,163,232,0.14); color: var(--blue); }
.badge-accent { background: rgba(124,106,247,0.14); color: var(--accent2); }
.badge-pink { background: rgba(232,121,160,0.14); color: var(--pink); }

.task-actions { display: flex; gap: 4px; align-items: flex-start; flex-shrink: 0; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--dim); padding: 5px 6px; border-radius: 7px; font-size: 13px; transition: all 0.15s; line-height: 1; display: flex; align-items: center; justify-content: center; }
.icon-btn:hover { color: var(--text); background: var(--s3); }
.icon-btn.del:hover { color: var(--red); background: rgba(240,96,96,0.1); }

/* TIMER */
.timer-pill { font-family: var(--fm); font-size: 12px; font-weight: 500; padding: 3px 10px 3px 8px; border-radius: 20px; background: var(--s3); color: var(--text); display: inline-flex; align-items: center; gap: 6px; cursor: pointer; border: 1px solid var(--b2); transition: all 0.15s; }
.timer-pill:hover { border-color: var(--accent); background: var(--s4); }
.timer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
.timer-dot.running { background: var(--green); animation: blink 1s infinite; }
.timer-dot.warn    { background: var(--amber); animation: blink 0.6s infinite; }
.timer-dot.expired { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.task-progress { height: 2px; background: var(--b2); border-radius: 2px; margin-top: 8px; }
.task-progress-fill { height: 100%; border-radius: 2px; transition: width 0.6s, background 0.4s; }

/* EMPTY STATE */
.empty { text-align: center; padding: 60px 20px; }
.empty-icon { font-size: 42px; opacity: 0.2; margin-bottom: 10px; }
.empty h3 { font-family: var(--fh); font-size: 17px; font-weight: 700; color: var(--dim); margin-bottom: 6px; }
.empty p { font-size: 13px; color: var(--dim); }

/* ================================================================
   DASHBOARD
   ================================================================ */
.dash-grid { display: grid; gap: 16px; }
.dash-row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.dash-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.dash-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 20px; }
.dash-card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.dash-card-title { font-family: var(--fm); font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.8px; }
.dash-big-num { font-family: var(--fh); font-size: 36px; font-weight: 800; line-height: 1; }
.dash-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

.dash-score-circle { width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
.dash-score-inner { width: 72px; height: 72px; border-radius: 50%; background: var(--s1); display: flex; align-items: center; justify-content: center; }
.dash-score-inner span { font-family: var(--fh); font-size: 28px; font-weight: 800; }

.mini-progress { height: 6px; background: var(--b2); border-radius: 6px; margin-top: 10px; overflow: hidden; }
.mini-progress-fill { height: 100%; border-radius: 6px; transition: width 0.5s; }

.bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; padding-top: 10px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar-fill { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.4s; min-height: 2px; }
.bar-label { font-size: 10px; color: var(--dim); font-family: var(--fm); }

.streak-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--b1); }
.streak-item:last-child { border-bottom: none; }
.streak-icon { font-size: 16px; width: 20px; text-align: center; }
.streak-name { flex: 1; font-size: 13px; }
.streak-count { font-family: var(--fm); font-size: 13px; font-weight: 500; color: var(--amber); }

.deadline-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--b1); }
.deadline-item:last-child { border-bottom: none; }
.deadline-title { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.deadline-date { font-family: var(--fm); font-size: 11px; color: var(--muted); }
.deadline-urgent { color: var(--red); }

.health-metric { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.health-icon { font-size: 16px; width: 24px; text-align: center; }
.health-label { font-size: 12px; color: var(--muted); width: 60px; }
.health-value { font-family: var(--fm); font-size: 13px; font-weight: 500; }

.notif-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px; border-radius: 8px; margin-bottom: 4px; cursor: pointer; transition: background 0.15s; }
.notif-item:hover { background: var(--s2); }
.notif-item.unread { background: rgba(124,106,247,0.06); }
.notif-item.unread .notif-title { font-weight: 600; color: var(--text); }
.notif-icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; margin-top: 2px; }
.notif-body { flex: 1; min-width: 0; }
.notif-title { font-size: 13px; color: var(--muted); margin-bottom: 2px; }
.notif-text { font-size: 11px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.notif-time { font-size: 10px; color: var(--dim); font-family: var(--fm); flex-shrink: 0; margin-top: 2px; }

/* ================================================================
   TIMELINE
   ================================================================ */
.timeline-date-nav { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.timeline-date-nav h2 { font-family: var(--fh); font-size: 18px; font-weight: 700; }
.timeline-nav-btn { background: var(--s2); border: 1px solid var(--b1); color: var(--muted); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.15s; }
.timeline-nav-btn:hover { background: var(--s3); color: var(--text); }
.time-block { margin-bottom: 24px; }
.time-block-hdr { font-family: var(--fm); font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--b1); }
.timeline-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--s1); border: 1px solid var(--b1); border-radius: 10px; margin-bottom: 6px; }
.timeline-type { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
.timeline-info { flex: 1; min-width: 0; }
.timeline-info-title { font-size: 13px; font-weight: 500; }
.timeline-info-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.timeline-status { font-size: 11px; font-family: var(--fm); }

/* ================================================================
   TASKS VIEW (sidebar within tasks)
   ================================================================ */
.tasks-layout { display: grid; grid-template-columns: 200px 1fr; height: 100%; overflow: hidden; }
.tasks-sidebar { background: var(--s1); border-right: 1px solid var(--b1); overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
.tasks-sidebar .nav-lbl { padding: 10px 8px 5px; }
.tasks-main { display: flex; flex-direction: column; overflow: hidden; }
.tasks-stats { padding: 10px; border-top: 1px solid var(--b1); margin-top: auto; }
.tasks-stats-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); font-family: var(--fm); margin-bottom: 6px; }
.nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ================================================================
   HABITS
   ================================================================ */
.habits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.habit-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 18px; transition: border-color 0.15s; }
.habit-card:hover { border-color: var(--b2); }
.habit-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.habit-icon { font-size: 22px; }
.habit-title { font-size: 15px; font-weight: 600; flex: 1; }
.habit-streak { font-family: var(--fm); font-size: 13px; color: var(--amber); display: flex; align-items: center; gap: 4px; margin-bottom: 10px; }
.habit-streak .flame { animation: flicker 0.6s infinite alternate; }
@keyframes flicker { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
.habit-checkin-btn { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid var(--b2); background: none; color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: var(--fb); }
.habit-checkin-btn:hover { border-color: var(--green); color: var(--green); }
.habit-checkin-btn.checked { background: rgba(62,207,142,0.15); border-color: var(--green); color: var(--green); }
.habit-week { display: flex; gap: 6px; margin: 12px 0; justify-content: center; }
.habit-day-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--b2); }
.habit-day-dot.done { background: var(--green); border-color: var(--green); }
.habit-day-dot.future { border-style: dashed; }
.habit-stats { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); font-family: var(--fm); margin-top: 8px; }

/* ================================================================
   GOALS
   ================================================================ */
.goal-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
.goal-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.goal-title { font-size: 16px; font-weight: 600; flex: 1; }
.goal-desc { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
.goal-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; font-size: 12px; color: var(--muted); }
.goal-progress { margin-bottom: 16px; }
.goal-progress-bar { height: 8px; background: var(--b2); border-radius: 8px; overflow: hidden; }
.goal-progress-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--accent), var(--blue)); transition: width 0.5s; }
.goal-progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); font-family: var(--fm); margin-top: 4px; }
.milestone-list { border-top: 1px solid var(--b1); padding-top: 12px; }
.milestone-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--b1); }
.milestone-item:last-child { border-bottom: none; }
.milestone-check { width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--b3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: none; flex-shrink: 0; }
.milestone-check.done { background: var(--green); border-color: var(--green); }
.milestone-check.done::after { content: ''; width: 4px; height: 7px; border: 2px solid #0d0e12; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); display: block; }
.milestone-title { flex: 1; font-size: 13px; }
.milestone-progress { font-family: var(--fm); font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.milestone-progress input { width: 50px; background: var(--s2); border: 1px solid var(--b2); border-radius: 4px; padding: 2px 6px; color: var(--text); font-family: var(--fm); font-size: 12px; text-align: center; }
.milestone-progress input:focus { outline: none; border-color: var(--accent); }
.goal-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* ================================================================
   FITNESS
   ================================================================ */
.fitness-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
.fitness-metric { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 18px; text-align: center; }
.fitness-metric-icon { font-size: 24px; margin-bottom: 6px; }
.fitness-metric-val { font-family: var(--fh); font-size: 24px; font-weight: 700; }
.fitness-metric-lbl { font-size: 11px; color: var(--dim); font-family: var(--fm); margin-top: 4px; }
.fitness-history { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
.fitness-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.fitness-table th { font-family: var(--fm); font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--b1); }
.fitness-table td { padding: 8px 10px; border-bottom: 1px solid var(--b1); color: var(--muted); }
.fitness-table tr:last-child td { border-bottom: none; }
.weight-card, .mood-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 20px; }
.mood-row { display: flex; gap: 12px; font-size: 22px; margin-top: 10px; }
.mood-day { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.mood-day-label { font-size: 10px; color: var(--dim); font-family: var(--fm); }
.workout-list { margin-top: 12px; }
.workout-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13px; }
.workout-item .workout-type { font-family: var(--fm); font-size: 11px; color: var(--accent2); }

/* ================================================================
   CAREER
   ================================================================ */
.career-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
.career-stat { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 18px; text-align: center; }
.career-stat-val { font-family: var(--fh); font-size: 28px; font-weight: 700; }
.career-stat-lbl { font-size: 11px; color: var(--dim); font-family: var(--fm); margin-top: 4px; }
.radar-container { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }
.career-log-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--s1); border: 1px solid var(--b1); border-radius: 10px; margin-bottom: 8px; }
.career-log-type { font-family: var(--fm); font-size: 10px; text-transform: uppercase; padding: 3px 8px; border-radius: 20px; }
.career-log-info { flex: 1; min-width: 0; }
.career-log-title { font-size: 14px; font-weight: 500; }
.career-log-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; font-size: 12px; color: var(--muted); }
.career-log-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.career-log-tags span { font-size: 10px; padding: 2px 6px; border-radius: 20px; background: var(--s3); color: var(--dim); font-family: var(--fm); }
.dsa-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
.dsa-box { background: var(--s2); border-radius: 10px; padding: 14px; text-align: center; }
.dsa-box-val { font-family: var(--fh); font-size: 22px; font-weight: 700; }
.dsa-box-lbl { font-size: 11px; color: var(--dim); font-family: var(--fm); margin-top: 2px; }

/* ================================================================
   FOCUS
   ================================================================ */
.focus-active { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 30px; text-align: center; margin-bottom: 20px; }
.focus-timer-display { font-family: var(--fm); font-size: 56px; font-weight: 500; margin: 20px 0; letter-spacing: 4px; }
.focus-session-title { font-family: var(--fh); font-size: 18px; font-weight: 600; margin-bottom: 10px; }
.focus-progress-ring { width: 160px; height: 160px; margin: 0 auto 20px; position: relative; }
.focus-progress-ring svg { transform: rotate(-90deg); }
.focus-ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--fm); font-size: 40px; font-weight: 500; }
.focus-controls { display: flex; gap: 10px; justify-content: center; margin-top: 16px; }
.focus-distraction { margin-top: 14px; font-size: 12px; color: var(--muted); }

.focus-start { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 24px; margin-bottom: 20px; }
.focus-presets { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
.focus-preset-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--b2); background: none; color: var(--muted); cursor: pointer; font-family: var(--fm); font-size: 12px; transition: all 0.15s; }
.focus-preset-btn:hover, .focus-preset-btn.active { background: rgba(124,106,247,0.18); border-color: var(--accent); color: var(--accent2); }

.focus-history { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
.focus-session-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--b1); }
.focus-session-item:last-child { border-bottom: none; }
.focus-session-info { flex: 1; }
.focus-session-name { font-size: 13px; font-weight: 500; }
.focus-session-meta { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: var(--fm); }

.focus-stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }

/* ================================================================
   REVIEW
   ================================================================ */
.review-period { font-family: var(--fh); font-size: 16px; font-weight: 600; margin-bottom: 20px; color: var(--muted); }
.review-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
.review-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 18px; text-align: center; }
.review-card-val { font-family: var(--fh); font-size: 28px; font-weight: 700; }
.review-card-lbl { font-size: 11px; color: var(--dim); font-family: var(--fm); margin-top: 4px; }
.review-section { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
.review-section-title { font-family: var(--fh); font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.review-detail { padding: 8px 0; border-bottom: 1px solid var(--b1); font-size: 13px; display: flex; justify-content: space-between; }
.review-detail:last-child { border-bottom: none; }
.review-detail-lbl { color: var(--muted); }
.review-detail-val { font-family: var(--fm); font-weight: 500; }
.insight-card { background: var(--s2); border: 1px solid var(--b1); border-radius: 10px; padding: 14px; margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; }
.insight-icon { font-size: 16px; flex-shrink: 0; }
.insight-text { font-size: 13px; color: var(--muted); line-height: 1.5; }

/* ================================================================
   MODALS
   ================================================================ */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(3px); }
.modal { background: var(--s1); border: 1px solid var(--b2); border-radius: 16px; padding: 26px; width: 100%; max-width: 520px; animation: slideUp 0.2s ease; max-height: 85vh; overflow-y: auto; }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
.modal-hdr h3 { font-family: var(--fh); font-size: 18px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px 6px; border-radius: 6px; }
.modal-close:hover { color: var(--text); background: var(--s3); }

.fg { margin-bottom: 15px; }
.fl { display: block; font-size: 11px; font-family: var(--fm); color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.6px; }
.fi { width: 100%; background: var(--s2); border: 1px solid var(--b2); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px; font-family: var(--fb); transition: border 0.15s; }
.fi:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,247,0.12); }
.fi::placeholder { color: var(--dim); }
select.fi option { background: var(--s2); color: var(--text); }
textarea.fi { resize: vertical; min-height: 70px; }
.f2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.f3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 22px; border-top: 1px solid var(--b1); padding-top: 16px; }

/* TIMER PRESETS */
.timer-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.preset-btn { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: var(--s3); border: 1px solid var(--b2); color: var(--muted); cursor: pointer; font-family: var(--fm); transition: all 0.13s; }
.preset-btn:hover { background: var(--s4); color: var(--text); border-color: var(--accent); }

/* MOOD PICKER */
.mood-picker { display: flex; gap: 8px; }
.mood-btn { font-size: 24px; padding: 8px 12px; border-radius: 10px; border: 2px solid var(--b2); background: none; cursor: pointer; transition: all 0.15s; }
.mood-btn:hover { border-color: var(--accent); transform: scale(1.1); }
.mood-btn.selected { border-color: var(--accent); background: rgba(124,106,247,0.15); transform: scale(1.1); }

/* DAY CHECKBOXES */
.day-checks { display: flex; gap: 6px; margin-top: 6px; }
.day-check { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--b2); background: none; color: var(--muted); cursor: pointer; font-size: 11px; font-family: var(--fm); transition: all 0.15s; }
.day-check.selected { background: rgba(124,106,247,0.18); border-color: var(--accent); color: var(--accent2); }

/* MILESTONE INPUTS IN MODAL */
.milestone-inputs { margin-top: 8px; }
.milestone-input-row { display: grid; grid-template-columns: 1fr 80px 80px 30px; gap: 8px; margin-bottom: 8px; align-items: center; }
.milestone-input-row input { background: var(--s2); border: 1px solid var(--b2); border-radius: 6px; padding: 6px 8px; color: var(--text); font-size: 12px; font-family: var(--fb); }
.milestone-input-row input:focus { outline: none; border-color: var(--accent); }
.milestone-remove-btn { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 14px; padding: 2px; border-radius: 4px; }
.milestone-remove-btn:hover { color: var(--red); }

/* WORKOUT INPUTS IN MODAL */
.workout-inputs { margin-top: 8px; }
.workout-input-row { display: grid; grid-template-columns: 1fr 1fr 80px 30px; gap: 8px; margin-bottom: 6px; align-items: center; }
.workout-input-row select, .workout-input-row input { background: var(--s2); border: 1px solid var(--b2); border-radius: 6px; padding: 6px 8px; color: var(--text); font-size: 12px; font-family: var(--fb); }

/* ================================================================
   NOTIFICATION PANEL
   ================================================================ */
.notif-panel { position: fixed; top: 38px; right: 0; bottom: 0; width: 360px; background: var(--s1); border-left: 1px solid var(--b2); z-index: 500; transform: translateX(100%); transition: transform 0.25s ease; display: flex; flex-direction: column; box-shadow: -4px 0 20px rgba(0,0,0,0.3); }
.notif-panel.open { transform: translateX(0); }
.notif-panel-hdr { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--b1); }
.notif-panel-hdr h3 { font-family: var(--fh); font-size: 16px; font-weight: 700; }
.notif-panel-list { flex: 1; overflow-y: auto; padding: 10px; }
.notif-panel-empty { text-align: center; padding: 40px 20px; color: var(--dim); font-size: 13px; }

/* ================================================================
   TOAST
   ================================================================ */
.toast { position: fixed; bottom: 22px; right: 22px; background: var(--s2); border: 1px solid var(--b2); border-radius: 10px; padding: 11px 16px; font-size: 13px; z-index: 999; transform: translateY(50px); opacity: 0; transition: all 0.25s; max-width: 280px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
.toast.show { transform: translateY(0); opacity: 1; }

/* ================================================================
   CONTEXT MENU
   ================================================================ */
.ctx-menu { position: fixed; background: var(--s2); border: 1px solid var(--b2); border-radius: 10px; padding: 6px; z-index: 500; min-width: 160px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); animation: fadeIn 0.1s; }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
.ctx-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 7px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all 0.12s; border: none; background: none; width: 100%; text-align: left; }
.ctx-item:hover { background: var(--s3); color: var(--text); }
.ctx-item.danger:hover { color: var(--red); background: rgba(240,96,96,0.1); }
.ctx-sep { height: 1px; background: var(--b1); margin: 4px 0; }

/* ================================================================
   SCROLLBARS
   ================================================================ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--b3); }

/* ================================================================
   UTILITY
   ================================================================ */
.hidden { display: none !important; }
.text-green { color: var(--green); }
.text-amber { color: var(--amber); }
.text-red { color: var(--red); }
.text-blue { color: var(--blue); }
.text-accent { color: var(--accent2); }
.text-muted { color: var(--muted); }
.mt-12 { margin-top: 12px; }
.mb-12 { margin-bottom: 12px; }
.mb-20 { margin-bottom: 20px; }
</style>
</head>

<!-- ================================================================
     MAIN APP
     ================================================================ -->

<!-- ================================================================
     JAVASCRIPT
     ================================================================ -->
<script>
// ================================================================
// STATE
// ================================================================
let tasks = [];
let habits = [];
let goals = [];
let notifications = [];
let user = null;
let currentView = 'dashboard';
let editingTaskId = null;
let editingHabitId = null;
let editingGoalId = null;
let timers = {};
let currentTaskFilter = 'all';
let currentTaskPriority = 'all';
let currentTaskSearch = '';
let fitnessWorkouts = [];
let selectedMood = '';
let timelineDate = new Date();

// Focus session state
let focusInterval = null;
let focusState = null;

const API = window.nexusAPI;
const PRIORITY_COLOR = { urgent: '#f06060', high: '#f5a623', normal: '#7c6af7', low: '#444c60' };
const MOOD_EMOJI = { great: '\u{1F604}', good: '\u{1F642}', okay: '\u{1F610}', low: '\u{1F614}', bad: '\u{1F622}' };

// ================================================================
// HELPERS
// ================================================================
function todayStr() { return new Date().toISOString().slice(0, 10); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function pad(n) { return String(n).padStart(2, '0'); }

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function fmtSec(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
}

function scoreColor(score) {
  if (score > 70) return 'var(--green)';
  if (score > 40) return 'var(--amber)';
  return 'var(--red)';
}

function dayName(d) { return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]; }

// ================================================================
// INIT
// ================================================================
async function init() {
  try {
    const me = await API.getMe();
    if (me) {
      user = me;
      showApp();
    } else {
      document.getElementById('auth-screen').style.display = 'flex';
    }
  } catch (e) {
    document.getElementById('auth-screen').style.display = 'flex';
  }
}

async function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'grid';
  updateTitlebar();

  // Load data in parallel
  try {
    const [t, h, g, n] = await Promise.all([
      API.loadTasks().catch(() => []),
      API.loadHabits().catch(() => []),
      API.loadGoals().catch(() => []),
      API.loadNotifications().catch(() => [])
    ]);
    tasks = t || [];
    habits = h || [];
    goals = g || [];
    notifications = n || [];
  } catch(e) {
    tasks = []; habits = []; goals = []; notifications = [];
  }

  updateNavCounts();
  updateNotifBadge();
  updateLifeScore();
  navigateTo('dashboard');

  // Periodic updates
  setInterval(updateTitlebar, 60000);
  setInterval(checkAlerts, 30 * 60 * 1000);
  setInterval(() => { API.generateSnapshot().catch(() => {}); }, 60 * 60 * 1000);
}

// ================================================================
// AUTH
// ================================================================
function toggleAuth(isReg) {
  document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
  document.getElementById('register-form').style.display = isReg ? 'block' : 'none';
  document.getElementById('otp-form').style.display = 'none';
  document.getElementById('auth-sub').textContent = isReg ? 'Create your workspace' : 'Daily Life Operating System';
  document.getElementById('auth-error').style.display = 'none';
}

let pendingEmail = '';

async function handleLogin() {
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-pass').value;
  if (!email || !password) return showAuthError('All fields required');
  try {
    const res = await API.login({ email, password });
    if (res.success) { user = res.user; showApp(); }
    else showAuthError(res.message || 'Login failed');
  } catch (e) { showAuthError('Connection error'); }
}

async function handleRegister() {
  const first_name = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const password = document.getElementById('r-pass').value;
  if (!first_name || !email || !password) return showAuthError('All fields required');
  try {
    const res = await API.register({ first_name, email, password });
    if (res.success) {
      if (res.needsVerification) {
        pendingEmail = res.email;
        document.getElementById('register-form').style.display = 'none';
        document.getElementById('otp-form').style.display = 'block';
        document.getElementById('auth-sub').textContent = 'Verify your email';
        document.getElementById('auth-error').style.display = 'none';
      } else { user = res.user; showApp(); }
    } else showAuthError(res.message || 'Registration failed');
  } catch (e) { showAuthError('Connection error'); }
}

async function handleVerifyOTP() {
  const otp = document.getElementById('v-otp').value.trim();
  if (!otp) return showAuthError('Please enter the code');
  try {
    const res = await API.verifyOTP({ email: pendingEmail, otp });
    if (res.success) { user = res.user; showApp(); }
    else showAuthError(res.message || 'Invalid code');
  } catch (e) { showAuthError('Connection error'); }
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function handleLogout() {
  await API.logout().catch(() => {});
  user = null; tasks = []; habits = []; goals = []; notifications = [];
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  toggleAuth(false);
}

// ================================================================
// TITLEBAR
// ================================================================
function updateTitlebar() {
  const now = new Date();
  const info = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  document.getElementById('tb-info').textContent = user ? `${info} \u00b7 ${user.name || user.first_name || ''}` : info;
}

// ================================================================
// NAVIGATION
// ================================================================
function navigateTo(view) {
  currentView = view;
  // Update nav active state
  document.querySelectorAll('.nav-item[data-view]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === view);
  });
  // Show/hide views
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + view);
  if (el) el.classList.add('active');
  // Update topbar
  updateTopbar(view);
  // Render
  renderView(view);
}

function updateTopbar(view) {
  const titles = {
    dashboard: 'Dashboard', timeline: 'Timeline', tasks: 'Tasks',
    habits: 'Habits', goals: 'Goals', fitness: 'Fitness & Health',
    career: 'Career & Learning', focus: 'Focus Sessions', review: 'Weekly Review'
  };
  document.getElementById('view-title').textContent = titles[view] || view;

  const actions = document.getElementById('topbar-actions');
  let html = '';
  switch (view) {
    case 'tasks':
      html = `
        <button class="btn btn-ghost" onclick="exportTasks()">Export</button>
        <button class="btn btn-ghost" onclick="importTasks()">Import</button>
        <button class="btn btn-ghost btn-danger" onclick="clearDone()">Clear done</button>
        <button class="btn btn-primary" onclick="openTaskModal()">+ New Task</button>`;
      break;
    case 'habits':
      html = `<button class="btn btn-primary" onclick="openHabitModal()">+ New Habit</button>`;
      break;
    case 'goals':
      html = `<button class="btn btn-primary" onclick="openGoalModal()">+ New Goal</button>`;
      break;
    case 'fitness':
      html = `<button class="btn btn-primary" onclick="openFitnessModal()">Log Today</button>`;
      break;
    case 'career':
      html = `<button class="btn btn-primary" onclick="openCareerModal()">+ Log Activity</button>`;
      break;
  }
  html += ` <button class="btn btn-ghost" onclick="handleLogout()" title="Sign out">Logout</button>`;
  actions.innerHTML = html;
}

function renderView(view) {
  switch (view) {
    case 'dashboard': renderDashboard(); break;
    case 'timeline': renderTimeline(); break;
    case 'tasks': renderTasksView(); break;
    case 'habits': renderHabits(); break;
    case 'goals': renderGoals(); break;
    case 'fitness': renderFitness(); break;
    case 'career': renderCareer(); break;
    case 'focus': renderFocus(); break;
    case 'review': renderReview(); break;
  }
}

// Nav click handlers
document.querySelectorAll('.nav-item[data-view]').forEach(btn => {
  btn.addEventListener('click', () => navigateTo(btn.dataset.view));
});

// ================================================================
// NAV COUNTS
// ================================================================
function updateNavCounts() {
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  set('nav-tasks-count', tasks.filter(t => !t.done).length);
  set('nav-habits-count', habits.length);
  set('nav-goals-count', goals.filter(g => g.status !== 'completed').length);
}

// ================================================================
// LIFE SCORE
// ================================================================
async function updateLifeScore() {
  try {
    const data = await API.getDashboardData();
    const score = data && data.lifeScore != null ? Math.round(data.lifeScore) : 0;
    const el = document.getElementById('sidebar-life-score');
    if (el) el.textContent = score;
    const pct = Math.max(0, Math.min(100, score));
    const ring = document.getElementById('sidebar-life-ring');
    if (ring) ring.style.background = `conic-gradient(${scoreColor(score)} ${pct * 3.6}deg, var(--b2) ${pct * 3.6}deg)`;
    const numEl = document.getElementById('sidebar-life-score');
    if (numEl) numEl.style.color = scoreColor(score);
  } catch (e) {}
}

// ================================================================
// NOTIFICATIONS
// ================================================================
function updateNotifBadge() {
  const unread = notifications.filter(n => !n.read).length;
  const badge = document.getElementById('notif-badge');
  if (badge) {
    badge.textContent = unread;
    badge.classList.toggle('hidden', unread === 0);
  }
}

function toggleNotifPanel() {

  list.innerHTML = notifications.map(n => `

async function markNotifRead(id) {
  try { await API.markNotificationRead(id); } catch(e) {}
  const n = notifications.find(x => (x.id || x._id) === id);
  if (n) n.read = true;
  updateNotifBadge();
  renderNotifPanel();
}

async function clearReadNotifs() {
  try { await API.clearNotifications(); } catch(e) {}
  notifications = notifications.filter(n => !n.read);
  renderNotifPanel();
  updateNotifBadge();
}

async function checkAlerts() {
  try {
    const alerts = await API.checkAlerts();
    if (alerts && alerts.length > 0) {
      notifications = [...alerts, ...notifications];
      updateNotifBadge();
      toast(alerts[0].title || 'New alert');
    }
  } catch(e) {}
}

async function renderTimeline() {
  const el = document.getElementById('view-timeline');
  const dateStr = timelineDate.toISOString().slice(0, 10);
  const dateDisplay = timelineDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  let fitnessLog = null;
  let focusSessions = [];
  let habitLogs = [];
  try {
    [fitnessLog, focusSessions, habitLogs] = await Promise.all([
      API.getFitnessLog(dateStr).catch(() => null),
      API.loadFocusSessions(7).catch(() => []),
      API.loadAllHabitLogs(7).catch(() => [])
    ]);
  } catch(e) {}

  // Collect items
  const items = [];

  // Tasks created today
  tasks.forEach(t => {
    const created = new Date(t.created);
    if (created.toISOString().slice(0, 10) === dateStr) {
      items.push({ time: created, type: 'task', icon: '\u2705', title: t.title, status: t.done ? 'Done' : 'Active', detail: t.priority });
    }
  });

  // Habits with reminder times
  habits.forEach(h => {
    const log = habitLogs && habitLogs.find(l => l.habit_id === (h.id || h._id) && l.date === dateStr);
    const hour = h.reminder_time ? parseInt(h.reminder_time.split(':')[0]) : 8;
    const d = new Date(dateStr + 'T' + pad(hour) + ':00:00');
    items.push({ time: d, type: 'habit', icon: h.icon || '\u{1F504}', title: h.title, status: log ? 'Done' : 'Pending', detail: h.category });
  });

  // Focus sessions
  if (focusSessions) {
    focusSessions.forEach(s => {
      const d = new Date(s.created_at || s.createdAt || s.date);
      if (d.toISOString().slice(0, 10) === dateStr) {
        items.push({ time: d, type: 'focus', icon: '\u23F1', title: s.title, status: s.completed ? 'Completed' : 'Partial', detail: fmtSec(s.duration_actual_sec || 0) });
      }
    });
  }

  // Workouts
  if (fitnessLog && fitnessLog.workouts) {
    fitnessLog.workouts.forEach(w => {
      items.push({ time: new Date(dateStr + 'T10:00:00'), type: 'workout', icon: '\u{1F4AA}', title: w.name || w.type, status: 'Logged', detail: (w.duration || 0) + ' min' });
    });
  }

  items.sort((a, b) => a.time - b.time);

  const morning = items.filter(i => i.time.getHours() >= 6 && i.time.getHours() < 12);
  const afternoon = items.filter(i => i.time.getHours() >= 12 && i.time.getHours() < 18);
  const evening = items.filter(i => i.time.getHours() >= 18 || i.time.getHours() < 6);

  function renderBlock(label, blockItems) {
    if (blockItems.length === 0) return '';
    return `<div class="time-block">
      <div class="time-block-hdr">${label}</div>
      ${blockItems.map(i => `
        <div class="timeline-item">
          <span class="timeline-type">${i.icon}</span>
          <div class="timeline-info">
            <div class="timeline-info-title">${esc(i.title)}</div>
            <div class="timeline-info-sub">${esc(i.detail)}</div>
          </div>
          <span class="timeline-status badge badge-${i.status === 'Done' || i.status === 'Completed' ? 'green' : i.status === 'Active' || i.status === 'Pending' ? 'amber' : 'accent'}">${i.status}</span>
        </div>
      `).join('')}
    </div>`;
  }

  el.innerHTML = `
    <div class="timeline-date-nav">
      <button class="timeline-nav-btn" onclick="shiftTimeline(-1)">&lt;</button>
      <h2>${dateDisplay}</h2>
      <button class="timeline-nav-btn" onclick="shiftTimeline(1)">&gt;</button>
    </div>
    ${items.length === 0 ? '<div class="empty"><div class="empty-icon">\u{1F4C5}</div><h3>No activity</h3><p>Nothing logged for this day</p></div>' : ''}
    ${renderBlock('Morning (6AM \u2013 12PM)', morning)}
    ${renderBlock('Afternoon (12PM \u2013 6PM)', afternoon)}
    ${renderBlock('Evening (6PM \u2013 12AM)', evening)}
  `;
}

function shiftTimeline(dir) {
  timelineDate.setDate(timelineDate.getDate() + dir);
  renderTimeline();
}

function setTaskFilter(f) { currentTaskFilter = f; renderTasksView(); }
function setTaskPriority(p) { currentTaskPriority = p; renderTaskList(); renderTasksView(); }

function getFilteredTasks() {
  const q = currentTaskSearch.toLowerCase();
  const today = todayStr();
  return tasks.filter(t => {
    if (q && !t.title.toLowerCase().includes(q) && !(t.desc || '').toLowerCase().includes(q) && !(t.tag || '').toLowerCase().includes(q)) return false;
    if (currentTaskPriority !== 'all' && t.priority !== currentTaskPriority) return false;
    if (currentTaskFilter === 'work') return t.workspace === 'work';
    if (currentTaskFilter === 'personal') return t.workspace === 'personal';
    if (currentTaskFilter === 'active') return !t.done;
    if (currentTaskFilter === 'done') return t.done;
    if (currentTaskFilter === 'timed') return t.timerTotal > 0;
    if (currentTaskFilter === 'overdue') return !t.done && t.due && t.due < today;
    if (currentTaskFilter === 'p-urgent') return t.priority === 'urgent';
    if (currentTaskFilter === 'p-high') return t.priority === 'high';
    if (currentTaskFilter === 'p-normal') return t.priority === 'normal';
    if (currentTaskFilter === 'p-low') return t.priority === 'low';
    return true;
  });
}

function renderTaskList() {
  const area = document.getElementById('task-list-area');
  if (!area) return;
  const filtered = getFilteredTasks();
  const active = filtered.filter(t => !t.done);
  const done = filtered.filter(t => t.done);

  if (filtered.length === 0) {
    area.innerHTML = '<div class="empty"><div class="empty-icon">\u25CE</div><h3>Nothing here</h3><p>Add a task or adjust your filter</p></div>';
    return;
  }

  let html = '';
  if (active.length > 0) {
    html += `<div class="section-hdr"><h3>Active \u2014 ${active.length}</h3><div class="section-line"></div></div>`;
    active.forEach(t => html += taskHTML(t));
  }
  if (done.length > 0) {
    html += `<div class="section-hdr" style="margin-top:22px"><h3>Done \u2014 ${done.length}</h3><div class="section-line"></div></div>`;
    done.forEach(t => html += taskHTML(t));
  }
  area.innerHTML = html;
}

function taskHTML(t) {
  const today = todayStr();
  const isOverdue = !t.done && t.due && t.due < today;
  const pct = t.timerTotal > 0 ? Math.round((1 - t.timerLeft / t.timerTotal) * 100) : 0;
  const pColor = t.timerLeft <= 0 ? 'var(--red)' : t.timerLeft < t.timerTotal * 0.2 ? 'var(--amber)' : 'var(--accent)';
  const dotClass = t.timerLeft <= 0 ? 'expired' : t.timerRunning ? (t.timerLeft < t.timerTotal * 0.2 ? 'warn' : 'running') : '';
  const timerBtn = t.timerLeft <= 0 ? '\u21BA' : t.timerRunning ? '\u23F8' : '\u25B6';

  const energyBadge = t.energy ? `<span class="badge badge-energy-${t.energy}">${t.energy === 'low' ? '\u26A1' : t.energy === 'medium' ? '\u26A1\u26A1' : '\u26A1\u26A1\u26A1'}${t.energy}</span>` : '';
  const catBadge = t.category ? `<span class="badge badge-category">${esc(t.category)}</span>` : '';

  return `<div class="task-card ${t.done ? 'done' : ''}" data-id="${t.id}" oncontextmenu="showCtx(event,'${t.id}')">
    <div class="priority-stripe" style="background:${PRIORITY_COLOR[t.priority]}"></div>
    <button class="cb ${t.done ? 'checked' : ''}" onclick="toggleDone('${t.id}')"></button>
    <div class="task-body">
      <div class="task-title">${esc(t.title)}</div>
      ${t.desc ? `<div class="task-desc">${esc(t.desc)}</div>` : ''}
      <div class="task-meta">
        <span class="badge badge-${t.workspace}">${t.workspace}</span>
        <span class="badge badge-${t.priority}">${t.priority}</span>
        ${t.tag ? `<span class="badge" style="background:var(--s3);color:var(--muted)">#${esc(t.tag)}</span>` : ''}
        ${t.due ? `<span class="badge badge-due ${isOverdue ? 'overdue' : ''}">${t.due}${isOverdue ? ' !' : ''}</span>` : ''}
        ${energyBadge}
        ${catBadge}
        ${t.timerTotal > 0 ? `
          <div class="timer-pill" id="tp-${t.id}" onclick="toggleTimer('${t.id}')" title="Click to start/pause">
            <span class="timer-dot ${dotClass}"></span>
            <span class="timer-time">${fmtTimer(t)}</span>
            <span style="font-size:10px;color:var(--dim);margin-left:2px">${timerBtn}</span>
          </div>` : ''}
      </div>
      ${t.timerTotal > 0 ? `<div class="task-progress"><div class="task-progress-fill" style="width:${pct}%;background:${pColor}"></div></div>` : ''}
    </div>
    <div class="task-actions">
      <button class="icon-btn" onclick="openTaskModal('${t.id}')" title="Edit">\u270E</button>
      ${t.timerTotal > 0 ? `<button class="icon-btn" onclick="resetTimer('${t.id}')" title="Reset timer">\u21BA</button>` : ''}
      <button class="icon-btn del" onclick="deleteTask('${t.id}')" title="Delete">\u2715</button>
    </div>
  </div>`;
}

function fmtTimer(t) {
  const s = t.timerLeft;
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
}

async function saveTask() {

  if (!title) { toast('Title is required'); return; }
  const mins = parseInt(document.getElementById('f-timer').value) || 0;
  const energy = document.getElementById('f-energy').value;

  if (editingTaskId) {

    t.due = document.getElementById('f-due').value;

    else { t.timerTotal = 0; t.timerLeft = 0; t.timerRunning = false; }
    stopTimer(editingTaskId);

  } else {

// Timer
function stopTimer(id) {
  const t = tasks.find(x => x.id === id);
  if (t) t.timerRunning = false;
  if (timers[id]) { clearInterval(timers[id]); delete timers[id]; }
}

async function toggleTimer(id) {
  const t = tasks.find(x => x.id === id);
  if (!t || t.timerTotal === 0 || t.done) return;
  if (t.timerLeft <= 0) {
    t.timerLeft = t.timerTotal;
    t.timerRunning = false;
    stopTimer(id);
    await saveTasks();
    renderTaskList();
    return;
  }
  t.timerRunning = !t.timerRunning;
  if (t.timerRunning) {
    timers[id] = setInterval(async () => {
      const task = tasks.find(x => x.id === id);
      if (!task) { clearInterval(timers[id]); return; }
      task.timerLeft = Math.max(0, task.timerLeft - 1);
      if (task.timerLeft <= 0) {
        task.timerRunning = false;
        stopTimer(id);
        await saveTasks();
        toast('Timer done: ' + task.title);
        // Native Windows notification + taskbar flash + email
        API.showNativeNotification('Timer Complete!', task.title + ' — time is up!');
        API.flashWindow();
        API.emailTimerDone(task.title);
        try { new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdH2JkZeXkYx/cWBQQjY0OEJPXnB/ipOWlZCJfnBgUEE0MDhCUWF0hI2UlpONhn5vYFBBNDA3QVBZY3N/h4qKh4N+eHNtaGRiYmRna3F3fIOIi42Ni4mGg398eXd2dnh6fYCDhouMjIqJh4WAe3h1dHR1d3p9gIOGiYqKiomHhYJ+e3h2dHR2eHt+gYOGiIqKiYiGg4B9endzc3R2eXx+gYOGiIqKiYiGg4B9eXdz').catch(() => {});
      }
      const el = document.getElementById('tp-' + id);
      if (el) refreshTimerEl(el, task);
    }, 1000);
  } else { stopTimer(id); }
  await saveTasks();
  renderTaskList();
}

async function resetTimer(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  stopTimer(id);
  t.timerLeft = t.timerTotal;
  await saveTasks();
  renderTaskList();
}

function refreshTimerEl(el, t) {
  const s = t.timerLeft;
  const txt = el.querySelector('.timer-time');
  if (txt) txt.textContent = fmtTimer(t);
  const dot = el.querySelector('.timer-dot');
  if (dot) {
    dot.className = 'timer-dot';
    if (s <= 0) dot.classList.add('expired');
    else if (t.timerRunning) dot.classList.add(s < t.timerTotal * 0.2 ? 'warn' : 'running');
  }
  const pf = el.closest('.task-card')?.querySelector('.task-progress-fill');
  if (pf && t.timerTotal > 0) {
    const pct = (1 - s / t.timerTotal) * 100;
    pf.style.width = pct + '%';
    pf.style.background = s <= 0 ? 'var(--red)' : s < t.timerTotal * 0.2 ? 'var(--amber)' : 'var(--accent)';
  }
}

  menu.innerHTML = `

async function renderHabits() {
  const el = document.getElementById('view-habits');
  let allLogs = [];
  try {
    allLogs = await API.loadAllHabitLogs(7).catch(() => []);
  } catch(e) {}
  if (!allLogs) allLogs = [];

  if (habits.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">\u{1F504}</div><h3>No habits yet</h3><p>Create your first habit to start tracking</p></div>';
    return;
  }

  const today = todayStr();
  const last7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    last7.push(d.toISOString().slice(0, 10));
  }

  el.innerHTML = `<div class="habits-grid">${habits.map(h => {
    const hid = h.id || h._id;
    const logs = allLogs.filter(l => l.habit_id === hid);
    const doneToday = logs.some(l => l.date === today);
    const streak = h.streak || 0;
    const totalDays = last7.length;
    const completedDays = last7.filter(d => logs.some(l => l.date === d)).length;
    const rate = totalDays > 0 ? Math.round(completedDays / totalDays * 100) : 0;

    return `<div class="habit-card">
      <div class="habit-top">
        <span class="habit-icon">${esc(h.icon || '\u{1F504}')}</span>
        <span class="habit-title">${esc(h.title)}</span>
        <span class="badge badge-accent">${esc(h.category || '')}</span>
        <button class="icon-btn" onclick="openHabitModal('${hid}')" title="Edit">\u270E</button>
        <button class="icon-btn del" onclick="deleteHabitConfirm('${hid}')" title="Delete">\u2715</button>
      </div>
      ${streak > 0 ? `<div class="habit-streak"><span class="flame">\u{1F525}</span> ${streak} days</div>` : '<div class="habit-streak" style="color:var(--dim)">No streak</div>'}
      <button class="habit-checkin-btn ${doneToday ? 'checked' : ''}" onclick="toggleHabitCheckin('${hid}')">
        ${doneToday ? '\u2713 Done today' : 'Check in'}
      </button>
      <div class="habit-week">
        ${last7.map((d, i) => {
          const isFuture = d > today;
          const isDone = logs.some(l => l.date === d);
          return `<div class="habit-day-dot ${isDone ? 'done' : ''} ${isFuture ? 'future' : ''}" title="${d}"></div>`;
        }).join('')}
      </div>
      <div class="habit-stats">
        <span>${rate}% (7d)</span>
        <span>Best: ${h.longest_streak || streak} days</span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

async function toggleHabitCheckin(habitId) {
  const today = todayStr();
  try {
    let allLogs = await API.loadAllHabitLogs(1).catch(() => []);
    if (!allLogs) allLogs = [];
    const done = allLogs.some(l => l.habit_id === habitId && l.date === today);
    if (done) {
      await API.uncheckHabit(habitId, today);
    } else {
      await API.checkinHabit(habitId, today);

  } catch(e) {}
  // Reload habits to get updated streaks
  try { habits = await API.loadHabits().catch(() => habits); } catch(e) {}
  updateNavCounts();
  renderHabits();
}

async function saveGoal() {
  const title = document.getElementById('fg-title').value.trim();
  if (!title) { toast('Title is required'); return; }
  const goal = {
    title,
    description: document.getElementById('fg-desc').value.trim(),
    category: document.getElementById('fg-category').value,
    target_date: document.getElementById('fg-target-date').value,
    milestones: goalMilestoneInputs.filter(m => m.title).map(m => ({
      id: uid(), title: m.title, target: m.target || 0, unit: m.unit || '', current: 0
    })),
    status: 'active'
  };
  if (editingGoalId) {
    goal.id = editingGoalId;
    goal._id = editingGoalId;
    // Preserve existing milestone progress
    const existing = goals.find(g => (g.id || g._id) === editingGoalId);
    if (existing && existing.milestones) {
      goal.milestones = goal.milestones.map(m => {
        const old = existing.milestones.find(om => om.title === m.title);
        if (old) m.current = old.current || 0;
        return m;
      });
    }
  }
  try {
    await API.saveGoal(goal);
    goals = await API.loadGoals().catch(() => goals);
  } catch(e) { toast('Failed to save goal'); }
  closeGoalModal();

async function renderCareer() {
  const el = document.getElementById('view-career');
  let logs = [];
  try { logs = await API.loadCareerLogs(30).catch(() => []); } catch(e) {}
  if (!logs) logs = [];

  const totalDSA = logs.filter(l => l.type === 'DSA').length;
  const totalHours = (logs.reduce((s, l) => s + (l.duration || 0), 0) / 60).toFixed(1);

  // This week
  const weekStart = new Date();
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const weekStr = weekStart.toISOString().slice(0, 10);
  const weekLogs = logs.filter(l => (l.date || l.created_at || '') >= weekStr);
  const weekHours = (weekLogs.reduce((s, l) => s + (l.duration || 0), 0) / 60).toFixed(1);

  // Learning streak
  const uniqueDays = new Set(logs.map(l => (l.date || l.created_at || '').slice(0, 10)));
  let streak = 0;
  const d = new Date();
  while (uniqueDays.has(d.toISOString().slice(0, 10))) {
    streak++;
    d.setDate(d.getDate() - 1);
  }

  const skillMap = {};

  const skills = Object.entries(skillMap).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);

  // DSA breakdown
  const dsaLogs = logs.filter(l => l.type === 'DSA');

      <div class="career-stat"><div class="career-stat-val" style="color:var(--green)">${weekHours}h</div><div class="career-stat-lbl">This Week</div></div>
      <div class="career-stat"><div class="career-stat-val" style="color:var(--amber)">${streak}</div><div class="career-stat-lbl">Day Streak</div></div>
    </div>

    ${skills.length > 0 ? `
      <div class="radar-container">
        ${renderRadarChart(skills.slice(0, 6))}
      </div>
    ` : ''}

    <div class="dash-card mb-20">
      <div class="dash-card-title">Recent Activity</div>
      ${logs.length > 0 ? logs.slice(0, 15).map(l => {
        const typeColors = { DSA: 'badge-accent', Learning: 'badge-blue', Project: 'badge-green', 'Interview Prep': 'badge-amber' };
        const diffColors = { Easy: 'badge-green', Medium: 'badge-amber', Hard: 'badge-red' };
        const tags = l.skill_tags ? (Array.isArray(l.skill_tags) ? l.skill_tags : l.skill_tags.split(',').map(s => s.trim())) : [];
        return `<div class="career-log-item">
          <span class="career-log-type badge ${typeColors[l.type] || 'badge-accent'}">${esc(l.type)}</span>
          <div class="career-log-info">
            <div class="career-log-title">${esc(l.title)}</div>
            <div class="career-log-meta">
              ${l.platform ? `<span>${esc(l.platform)}</span>` : ''}
              ${l.difficulty ? `<span class="badge ${diffColors[l.difficulty] || ''}">${l.difficulty}</span>` : ''}
              ${l.duration ? `<span>${l.duration} min</span>` : ''}
            </div>
            ${tags.length > 0 ? `<div class="career-log-tags">${tags.map(t => `<span>${esc(t)}</span>`).join('')}</div>` : ''}
          </div>
        </div>`;
      }).join('') : '<div class="empty" style="padding:20px;"><p>No activity logged yet</p></div>'}
    </div>

    <div class="dash-card">
      <div class="dash-card-title">DSA Summary</div>
      <div class="dsa-summary">
        <div class="dsa-box"><div class="dsa-box-val" style="color:var(--green)">${easy}</div><div class="dsa-box-lbl">Easy</div></div>
        <div class="dsa-box"><div class="dsa-box-val" style="color:var(--amber)">${medium}</div><div class="dsa-box-lbl">Medium</div></div>
        <div class="dsa-box"><div class="dsa-box-val" style="color:var(--red)">${hard}</div><div class="dsa-box-lbl">Hard</div></div>
      </div>
    </div>
  `;
}

function renderRadarChart(skills) {
  if (skills.length < 3) return '';
  const n = skills.length;
  const cx = 150, cy = 150, r = 110;
  const maxCount = Math.max(...skills.map(s => s.count), 1);
  const levels = 3;

  let svg = `<svg width="300" height="300" viewBox="0 0 300 300">`;

  // Grid lines
  for (let level = 1; level <= levels; level++) {
    const lr = (r / levels) * level;
    let points = '';
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      points += `${cx + lr * Math.cos(angle)},${cy + lr * Math.sin(angle)} `;
    }
    svg += `<polygon points="${points}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
  }

  // Axis lines
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x2 = cx + r * Math.cos(angle);
    const y2 = cy + r * Math.sin(angle);
    svg += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
  }

  // Data polygon
  let dataPoints = '';
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const val = (skills[i].count / maxCount) * r;
    dataPoints += `${cx + val * Math.cos(angle)},${cy + val * Math.sin(angle)} `;
  }
  svg += `<polygon points="${dataPoints}" fill="rgba(124,106,247,0.3)" stroke="var(--accent2)" stroke-width="2"/>`;

  // Data points and labels
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const val = (skills[i].count / maxCount) * r;
    const px = cx + val * Math.cos(angle);
    const py = cy + val * Math.sin(angle);
    svg += `<circle cx="${px}" cy="${py}" r="3" fill="var(--accent2)"/>`;

    // Labels
    const lx = cx + (r + 18) * Math.cos(angle);
    const ly = cy + (r + 18) * Math.sin(angle);
    const anchor = Math.abs(Math.cos(angle)) < 0.1 ? 'middle' : Math.cos(angle) > 0 ? 'start' : 'end';
    svg += `<text x="${lx}" y="${ly}" fill="var(--muted)" font-size="11" font-family="var(--fm)" text-anchor="${anchor}" dominant-baseline="middle">${esc(skills[i].name)}</text>`;
  }

  svg += '</svg>';
  return svg;
}

async function renderFocus() {
  const el = document.getElementById('view-focus');
  let sessions = [];
  try { sessions = await API.loadFocusSessions(7).catch(() => []); } catch(e) {}
  if (!sessions) sessions = [];

  // Stats
  const totalSec = sessions.reduce((s, x) => s + (x.duration_actual_sec || 0), 0);
  const completed = sessions.filter(s => s.completed).length;
  const avgLen = sessions.length > 0 ? Math.round(totalSec / sessions.length / 60) : 0;
  const avgDist = sessions.length > 0 ? (sessions.reduce((s, x) => s + (x.distractions || 0), 0) / sessions.length).toFixed(1) : 0;

  let html = '';

  // Active session
  if (focusState) {
    const pct = focusState.planned > 0 ? Math.min(100, Math.round(focusState.elapsed / focusState.planned * 100)) : 0;
    const remaining = Math.max(0, focusState.planned - focusState.elapsed);
    const circumference = 2 * Math.PI * 68;
    const dashoffset = circumference * (1 - pct / 100);

    html += `
      <div class="focus-active">
        <div class="focus-session-title">${esc(focusState.title)}</div>
        <div class="focus-progress-ring">
          <svg width="160" height="160">
            <circle cx="80" cy="80" r="68" fill="none" stroke="var(--b2)" stroke-width="6"/>
            <circle cx="80" cy="80" r="68" fill="none" stroke="var(--accent2)" stroke-width="6"
              stroke-dasharray="${circumference}" stroke-dashoffset="${dashoffset}"
              stroke-linecap="round"/>
          </svg>
          <div class="focus-ring-text">${fmtSec(remaining)}</div>
        </div>
        <div class="focus-controls">
          ${focusState.running
            ? `<button class="btn btn-ghost" onclick="pauseFocusSession()">Pause</button>`
            : `<button class="btn btn-primary" onclick="resumeFocusSession()">Resume</button>`}
          <button class="btn btn-danger" onclick="stopFocusSession()">Stop</button>
          <button class="btn btn-ghost" onclick="addDistraction()">+1 Distraction</button>

    html += `

        <div class="dash-card-title mb-12">Start New Session</div>
        <div class="fg">
          <label class="fl">Title</label>
          <input class="fi" id="focus-title" placeholder="What are you focusing on?" />

          <label class="fl">Duration</label>

            <button class="focus-preset-btn active" onclick="setFocusDuration(25)">25m</button>
            <button class="focus-preset-btn" onclick="setFocusDuration(45)">45m</button>
            <button class="focus-preset-btn" onclick="setFocusDuration(60)">60m</button>
            <button class="focus-preset-btn" onclick="setFocusDuration(90)">90m</button>
            <button class="focus-preset-btn" onclick="setFocusDuration(120)">120m</button>
          </div>
          <input class="fi mt-12" id="focus-custom-dur" type="number" min="1" max="480" placeholder="Custom minutes" style="width:160px;" />
        </div>
        <div class="fg">
          <label class="fl">Category</label>
          <select class="fi" id="focus-category" style="width:200px;">
            <option value="Work">Work</option>
            <option value="Study">Study</option>
            <option value="Creative">Creative</option>
            <option value="Personal">Personal</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="startFocusSession()">Start Session</button>
      </div>
    `;
  }

  // Stats
  html += `
    <div class="focus-stats-grid">
      <div class="dash-card" style="text-align:center;">
        <div class="dash-card-title">Total Hours (7d)</div>
        <div class="dash-big-num" style="color:var(--accent2);margin-top:8px;">${(totalSec / 3600).toFixed(1)}</div>
      </div>
      <div class="dash-card" style="text-align:center;">

        <div class="dash-card-title">Avg Length</div>

      </div>

        <div class="dash-big-num" style="color:var(--amber);margin-top:8px;">${avgDist}</div>
      </div>
