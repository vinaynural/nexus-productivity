function startFocusSession() {
  const titleEl = document.getElementById('focus-title');
  const title = titleEl ? titleEl.value.trim() || 'Focus Session' : 'Focus Session';
  const customDur = document.getElementById('focus-custom-dur');
  const mins = (customDur && customDur.value) ? parseInt(customDur.value) : selectedFocusDuration;
  const category = document.getElementById('focus-category')?.value || 'Work';

  focusState = {
    title,
    category,
    planned: mins * 60,
    elapsed: 0,
    distractions: 0,
    running: true
  };

  focusInterval = setInterval(() => {
    if (!focusState || !focusState.running) return;
    focusState.elapsed++;
    if (focusState.elapsed >= focusState.planned) {
      completeFocusSession();
    } else {
      // Update display without full re-render
      updateFocusDisplay();
    }
  }, 1000);

  renderFocus();
}

function updateFocusDisplay() {
  if (!focusState) return;
  const ringText = document.querySelector('.focus-ring-text');
  if (ringText) {
    const remaining = Math.max(0, focusState.planned - focusState.elapsed);
    ringText.textContent = fmtSec(remaining);
  }
  // Update SVG ring
  const circle = document.querySelector('.focus-progress-ring svg circle:nth-child(2)');
  if (circle) {
    const pct = Math.min(100, Math.round(focusState.elapsed / focusState.planned * 100));
    const circumference = 2 * Math.PI * 68;
    circle.setAttribute('stroke-dashoffset', circumference * (1 - pct / 100));
  }
}

function pauseFocusSession() {
  if (!focusState) return;
  focusState.running = false;
  clearInterval(focusInterval);
  renderFocus();
}

function resumeFocusSession() {
  if (!focusState) return;
  focusState.running = true;
  focusInterval = setInterval(() => {
    if (!focusState || !focusState.running) return;
    focusState.elapsed++;
    if (focusState.elapsed >= focusState.planned) {
      completeFocusSession();
    } else {
      updateFocusDisplay();
    }
  }, 1000);
  renderFocus();
}

function addDistraction() {
  if (!focusState) return;
  focusState.distractions++;
  const el = document.querySelector('.focus-distraction');
  if (el) el.textContent = 'Distractions: ' + focusState.distractions;
}

async function completeFocusSession() {
  clearInterval(focusInterval);
  if (!focusState) return;
  focusState.running = false;
  try {
    await API.saveFocusSession({
      title: focusState.title,
      category: focusState.category,
      duration_planned_sec: focusState.planned,
      duration_actual_sec: focusState.elapsed,
      completed: focusState.elapsed >= focusState.planned,
      distractions: focusState.distractions
    });
  } catch(e) {}
  const fTitle = focusState.title;
  const fMins = Math.round(focusState.elapsed / 60);
  toast('Focus session complete!');
  API.showNativeNotification('Focus Session Complete!', fTitle + ' — great work!');
  API.flashWindow();
  API.emailFocusDone(fTitle, fMins);
  focusState = null;
  renderFocus();
}

async function stopFocusSession() {
  clearInterval(focusInterval);
  if (!focusState) return;
  focusState.running = false;
  try {
    await API.saveFocusSession({
      title: focusState.title,
      category: focusState.category,
      duration_planned_sec: focusState.planned,
      duration_actual_sec: focusState.elapsed,
      completed: false,
      distractions: focusState.distractions
    });
  } catch(e) {}
  toast('Session stopped');
  focusState = null;
  renderFocus();
}

// ================================================================
// VIEW: REVIEW
// ================================================================
async function renderReview() {
  const el = document.getElementById('view-review');
  let review = null;
  try { review = await API.getWeeklyReview().catch(() => null); } catch(e) {}

  // Period
  const end = new Date();
  const start = new Date();
  start.setDate(end.getDate() - 6);
  const periodStr = `${start.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${end.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;

  const r = review || {};
  const tasksCompleted = r.tasksCompleted || tasks.filter(t => t.done).length;
  const totalTasks = r.totalTasks || tasks.length;
  const habitConsistency = r.habitConsistency || 0;
  const focusHours = r.focusHours || 0;
  const avgEnergy = r.avgEnergy || 0;
  const weekScores = r.weeklyScores || r.scores || [];
  const insights = r.insights || [];

  const avgScore = weekScores.length > 0 ? Math.round(weekScores.reduce((s, x) => s + (x.score || 0), 0) / weekScores.length) : 0;

  el.innerHTML = `
    <div class="review-period">${periodStr}</div>

    <div class="review-summary">
      <div class="review-card">
        <div class="review-card-val" style="color:var(--blue)">${tasksCompleted}/${totalTasks}</div>
        <div class="review-card-lbl">Tasks Completed</div>
      </div>
      <div class="review-card">
        <div class="review-card-val" style="color:var(--green)">${Math.round(habitConsistency)}%</div>
        <div class="review-card-lbl">Habit Consistency</div>
      </div>
      <div class="review-card">
        <div class="review-card-val" style="color:var(--accent2)">${typeof focusHours === 'number' ? focusHours.toFixed(1) : focusHours}h</div>
        <div class="review-card-lbl">Focus Hours</div>
      </div>
      <div class="review-card">
        <div class="review-card-val" style="color:var(--amber)">${typeof avgEnergy === 'number' ? avgEnergy.toFixed(1) : avgEnergy}</div>
        <div class="review-card-lbl">Avg Energy</div>
      </div>
    </div>

    <!-- Life Score Trend -->
    <div class="review-section">
      <div class="review-section-title">Life Score Trend</div>
      <div class="bar-chart" style="height:100px;">
        ${renderWeekBars(weekScores)}
      </div>
      <div style="text-align:center;margin-top:10px;font-size:13px;color:var(--muted);">
        Average: <span style="color:${scoreColor(avgScore)};font-weight:600;">${avgScore}</span>
      </div>
    </div>

    <!-- Detailed Breakdown -->
    <div class="review-section">
      <div class="review-section-title">Detailed Breakdown</div>
      <div class="review-detail"><span class="review-detail-lbl">Task Completion Rate</span><span class="review-detail-val">${totalTasks > 0 ? Math.round(tasksCompleted / totalTasks * 100) : 0}%</span></div>
      <div class="review-detail"><span class="review-detail-lbl">Most Productive Day</span><span class="review-detail-val">${r.mostProductiveDay || '--'}</span></div>
      <div class="review-detail"><span class="review-detail-lbl">Habit Consistency</span><span class="review-detail-val">${Math.round(habitConsistency)}%</span></div>
      <div class="review-detail"><span class="review-detail-lbl">Avg Sleep</span><span class="review-detail-val">${r.avgSleep ? r.avgSleep.toFixed(1) + 'h' : '--'}</span></div>
      <div class="review-detail"><span class="review-detail-lbl">Exercise Days</span><span class="review-detail-val">${r.exerciseDays || '--'}</span></div>
      <div class="review-detail"><span class="review-detail-lbl">Career Hours</span><span class="review-detail-val">${r.careerHours ? r.careerHours.toFixed(1) + 'h' : '--'}</span></div>
      <div class="review-detail"><span class="review-detail-lbl">Problems Solved</span><span class="review-detail-val">${r.problemsSolved || '--'}</span></div>
    </div>

    <!-- Insights -->
    ${insights.length > 0 ? `
      <div class="review-section">
        <div class="review-section-title">Insights</div>
        ${insights.map(ins => {
          const text = typeof ins === 'string' ? ins : ins.text || ins.message || '';
          const icon = typeof ins === 'object' && ins.icon ? ins.icon : '\u{1F4A1}';
          return `<div class="insight-card">
            <span class="insight-icon">${icon}</span>
            <span class="insight-text">${esc(text)}</span>
          </div>`;
        }).join('')}
      </div>
    ` : ''}
  `;
}

// ================================================================
// KEYBOARD SHORTCUTS
// ================================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeTaskModal();
    closeHabitModal();
    closeGoalModal();
    closeFitnessModal();
    closeCareerModal();
    closeCtx();
    document.getElementById('notif-panel').classList.remove('open');
  }
  if (e.key === 'n' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    if (currentView === 'tasks') openTaskModal();
    else if (currentView === 'habits') openHabitModal();
    else if (currentView === 'goals') openGoalModal();
    else openTaskModal();
  }
  if (e.key === 'f' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    const searchEl = document.getElementById('task-search');
    if (searchEl) searchEl.focus();
  }
});

API.onShortcut('shortcut-new-task', () => openTaskModal());
API.onShortcut('shortcut-focus-search', () => {
  const searchEl = document.getElementById('task-search');
  if (searchEl) searchEl.focus();
});
API.onShortcut('shortcut-export', exportTasks);
API.onShortcut('shortcut-import', importTasks);

// ================================================================
// START
// ================================================================
init();
</script>
